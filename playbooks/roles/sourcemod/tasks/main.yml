---
- name: Clean sourcemod directory
  ansible.builtin.file:
    path: "{{ sourcemod_path }}"
    state: absent
    mode: "0775"
  when: clean

- name: Create sourcemod directory
  ansible.builtin.file:
    path: "{{ sourcemod_path }}"
    state: directory
    mode: "0775"

- name: Download latest metamod version info
  ansible.builtin.get_url:
    url: "https://mms.alliedmods.net/mmsdrop/{{ metamod_version }}/mmsource-latest-linux"
    dest: "{{ sourcemod_path }}/metamod-latest-linux"

- name: Load the latest metamod version
  ansible.builtin.slurp:
    src: "{{ sourcemod_path }}/metamod-latest-linux"
  register: latest_metamod_version

- name: Check for metamod installed version
  ansible.builtin.stat:
    path: "{{ sourcemod_path }}/metamod-installed-version"
  register: miv

- name: Load the installed metamod version
  ansible.builtin.slurp:
    src: "{{ sourcemod_path }}/metamod-installed-version"
  register: installed_metamod_version
  when: miv.stat.islnk is defined

- name: Compare metamod versions
  set_fact:
    should_install_metamod: true
  when: installed_metamod_version['content'] is not defined or installed_metamod_version['content'] != latest_metamod_version['content']

- name: Download metamod
  ansible.builtin.unarchive:
    src: "https://mms.alliedmods.net/mmsdrop/{{ metamod_version }}/{{ latest_metamod_version['content'] | b64decode }}"
    dest: "{{ sourcemod_path }}"
    remote_src: true
  when: should_install_metamod is defined and should_install_metamod

- name: Save installed metamod version
  ansible.builtin.copy:
    content: "{{ latest_metamod_version['content'] | b64decode }}"
    dest: "{{ sourcemod_path }}/metamod-installed-version"
  when: should_install_metamod is defined and should_install_metamod

- name: Download latest sourcemod version info
  ansible.builtin.get_url:
    url: "https://sm.alliedmods.net/smdrop/{{ sourcemod_version }}/sourcemod-latest-linux"
    dest: "{{ sourcemod_path }}/sourcemod-latest-linux"

- name: Load the latest sourcemod version
  ansible.builtin.slurp:
    src: "{{ sourcemod_path }}/sourcemod-latest-linux"
  register: latest_sourcemod_version

- name: Check for sourcemod installed version
  ansible.builtin.stat:
    path: "{{ sourcemod_path }}/sourcemod-installed-version"
  register: siv

- name: Load the latest sourcemod version
  ansible.builtin.slurp:
    src: "{{ sourcemod_path }}/sourcemod-installed-version"
  register: installed_sourcemod_version
  when: siv.stat.islnk is defined

- name: Compare sourcemod versions
  set_fact:
    should_install_sourcemod: true
  when: installed_sourcemod_version['content'] is not defined or installed_sourcemod_version['content'] != latest_sourcemod_version['content']

- name: Download sourcemod
  ansible.builtin.unarchive:
    src: "https://sm.alliedmods.net/smdrop/{{ sourcemod_version }}/{{ latest_sourcemod_version['content'] | b64decode }}"
    dest: "{{ sourcemod_path }}"
    remote_src: true
  when: should_install_sourcemod is defined and should_install_sourcemod

- name: Save installed sourcemod version
  ansible.builtin.copy:
    content: "{{ latest_sourcemod_version['content'] | b64decode }}"
    dest: "{{ sourcemod_path }}/sourcemod-installed-version"
  when: should_install_sourcemod is defined and should_install_sourcemod

- name: Copy extensions & plugin sources
  ansible.builtin.synchronize:
    src: "{{ role_path }}/files/"
    dest: "{{ sourcemod_path }}"

- name: Build plugins
  ansible.builtin.command:
    chdir: "{{ sourcemod_path }}/addons/sourcemod/scripting"
    cmd: bash build.sh
